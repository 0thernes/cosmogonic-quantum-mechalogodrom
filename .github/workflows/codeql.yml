name: CodeQL

# Static security analysis (GitHub Advanced Security). Scans the TypeScript/JavaScript on every
# push and PR to the default branch, plus a weekly scheduled sweep so newly-disclosed query
# patterns are caught even when the code is quiet. Findings surface in the Security tab.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '23 5 * * 1' # 05:23 UTC every Monday (off-the-hour to avoid the scheduler stampede)
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write # required to upload the SARIF results

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    # CodeQL is free on public repos; on private repos it needs GitHub Advanced Security. Skip
    # cleanly (rather than fail) when neither applies, so a private mirror has a green board and the
    # scan switches on automatically the moment the repo is made public.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: javascript-typescript
          # security-extended adds the higher-signal security queries beyond the default suite.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: '/language:javascript-typescript'
