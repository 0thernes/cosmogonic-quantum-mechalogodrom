name: CI

# The full gate (docs/CONTRIBUTING.md): prettier → tsc strict → oxlint → bun test → build.
# Runs on every push to the default branch and every PR. `workflow_dispatch` allows a manual
# run from the Actions tab. Concurrency cancels superseded runs on the same ref.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Full gate (${{ matrix.os }})
    # Cross-platform matrix (500-point §2.40): local dev is Windows, so run the gate on both Linux
    # and Windows to catch OS-specific path/EOL bugs. fail-fast off so one OS's failure still lets
    # the other report.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14' # pinned for reproducible CI; bump in lockstep with local

      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck (tsc --strict)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Unit tests (bun test)
        run: bun test

      - name: Coverage threshold (bunfig.toml — 500-point §17.339)
        run: bun run test:coverage

      - name: Production build
        run: bun run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist-${{ matrix.os }}-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    # Non-blocking: a perf regression should surface in the log, not fail the gate
    # (CI runners are noisier than the reference machine — see docs/BENCHMARKS.md).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Run mitata benchmarks
        run: bun run bench
