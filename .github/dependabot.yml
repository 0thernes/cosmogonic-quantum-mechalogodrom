version: 2
updates:
  # Production + dev dependencies (Bun reads package.json; npm ecosystem covers it).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Batch the noisy, low-risk dev tooling into one PR; keep three/runtime deps separate.
      dev-tooling:
        patterns:
          - prettier
          - prettier-*
          - oxlint
          - '@types/*'
          - mitata
          - tailwindcss
          - bun-plugin-tailwind
    labels:
      - dependencies
    commit-message:
      prefix: 'chore(deps)'

  # Keep the GitHub Actions in CI current (checkout, setup-bun, cache, upload-artifact).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - ci
    commit-message:
      prefix: 'chore(ci)'
