[serve.static]
plugins = ["bun-plugin-tailwind"]

# Coverage regression guard (500-point §17.339). Thresholds sit just below the measured 90.5% func
# / 95.6% line so normal change has headroom, but a real drop fails. Only enforced when coverage is
# collected (`bun test --coverage`, run by `bun run test:coverage` in CI) — the local `bun test`
# stays fast and uninstrumented.
[test]
coverageThreshold = { line = 0.9, function = 0.85 }
