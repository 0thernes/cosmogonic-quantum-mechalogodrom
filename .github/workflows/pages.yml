name: Deploy to GitHub Pages

# CD: build the REAL app (not the old hand-pushed legacy demo) and publish it to GitHub Pages on
# every successful CI push to the default branch. Replaces the stale `gh-pages` branch source — set the repo's
# Pages source to "GitHub Actions" (build_type=workflow) for this to publish. The site is assembled
# by scripts/build-pages.ts (dist/ + /lab + subpath-relative nav rewrites).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:

# Least privilege + the tokens the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    if: >
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Full gate for manual deployments
        if: github.event_name == 'workflow_dispatch'
        run: bun run check

      - name: Generated artifact freshness for manual deployments
        if: github.event_name == 'workflow_dispatch'
        run: bun run generated:check

      - name: Build + assemble Pages site
        run: bun run pages

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # V123 (USER #9 "market didn't transfer to Pages"): the GitHub Pages deployment API
      # intermittently 500s with "Deployment failed, try again later" (the market-band commit
      # ac5f025f hit exactly this — the BUILD succeeded, only the deploy API flaked, so the band
      # was published only when the NEXT commit redeployed). A bounded timeout + more tolerated
      # status-poll errors turns that transient GitHub-side flake into a self-healing publish.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          timeout: 600000 # ms — wait up to 10 min for the Pages CDN to report ready
          error_count: 15 # tolerate more transient status-poll errors before giving up
