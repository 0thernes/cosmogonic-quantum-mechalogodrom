name: CI

# The full gate (docs/CONTRIBUTING.md): prettier → tsc strict → oxlint → bun test → build.
# Runs on every push to the default branch and every PR. `workflow_dispatch` allows a manual
# run from the Actions tab. Concurrency cancels superseded runs on the same ref.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Full gate (${{ matrix.os }})
    # Cross-platform matrix (500-point §2.40): local dev is Windows, so run the gate on both Linux
    # and Windows to catch OS-specific path/EOL bugs. fail-fast off so one OS's failure still lets
    # the other report.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14' # pinned for reproducible CI; bump in lockstep with local

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck (tsc --strict)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Unit tests (bun test)
        run: bun test

      - name: Coverage threshold (bunfig.toml — 500-point §17.339)
        run: bun run test:coverage

      - name: Production build
        run: bun run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.os }}-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    # Non-blocking: a perf regression should surface in the log, not fail the gate
    # (CI runners are noisier than the reference machine — see docs/BENCHMARKS.md).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Run mitata benchmarks
        run: bun run bench

  dependency-review:
    name: Dependency review (PRs)
    # Supply-chain gate: flag known-vulnerable or malicious dependencies a PR would introduce, BEFORE
    # they merge (complements Dependabot, which only bumps what's already in). PR-only — it diffs the
    # base→head manifests; the public-repo dependency graph is free.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # post the review summary as a PR comment on failure
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  audit:
    name: Supply-chain audit (full tree)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Complements dependency-review (which only diffs a PR's NEW deps): bun audit scans the FULL
    # installed tree on every push/PR, so a CVE newly disclosed against an ALREADY-present dependency
    # is surfaced too — the class of advisory a PR-diff review structurally cannot see. Non-blocking
    # (like bench): a transitive LOW/MODERATE advisory is logged, not gate-failing; the second step
    # isolates the serious tier (drop continue-on-error to hard-gate on HIGH/CRITICAL).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Audit dependencies (all advisories — informational)
        run: bun audit
      - name: Flag HIGH/CRITICAL advisories
        run: bun audit --audit-level=high
