name: Deploy to GitHub Pages

# CD: build the REAL app (not the old hand-pushed legacy demo) and publish it to GitHub Pages on
# every push to the default branch. Replaces the stale `gh-pages` branch source — set the repo's
# Pages source to "GitHub Actions" (build_type=workflow) for this to publish. The site is assembled
# by scripts/build-pages.ts (dist/ + /lab + subpath-relative nav rewrites).
on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Least privilege + the tokens the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Build + assemble Pages site
        run: bun run pages

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
