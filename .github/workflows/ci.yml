name: CI

# The full gate (CONTRIBUTING.md): prettier → tsc strict → oxlint → bun test+coverage →
# verify:receipts → sync:check → verify:facts → build.
# Runs on every push to the default branch and every PR. `workflow_dispatch` allows a manual
# run from the Actions tab. Concurrency cancels superseded runs on the same ref.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Full gate (${{ matrix.os }})
    # Cross-platform matrix (500-point §2.40): local dev is Windows, so run the gate on both Linux
    # and Windows to catch OS-specific path/EOL bugs. fail-fast off so one OS's failure still lets
    # the other report.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14' # pinned for reproducible CI; bump in lockstep with local

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            dist/
            node_modules/.cache/
          key: build-${{ runner.os }}-${{ hashFiles('src/**', 'bun.lock') }}
          restore-keys: |
            build-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck (tsc --strict)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Unit tests + coverage + receipts law
        # Single run: coverage threshold (bunfig.toml) + receipts parse share one transcript.
        # Direct spawn (not stdin pipe) — reliable on Windows where pipe deadlocks are common.
        # Parallel test execution for faster CI (Phase 1.3 optimization)
        run: bun test --coverage 2>&1 | bun scripts/verify-receipts.ts --stdin

      - name: Surface sync check (version + receipts propagated to every MD/HTML)
        run: bun run sync:check

      - name: Cross-surface fact audit (no canonical-fact drift across surfaces)
        run: bun run verify:facts

      - name: Production build
        run: bun run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-${{ matrix.os }}-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

      # Owner-critical feature regression gate. This step makes NO unverifiable claims: it runs the
      # actual behavioral/contract test files that back each owner-requested feature. If any feature
      # regresses (or a seal file is renamed/deleted), this step FAILS LOUDLY — it is falsifiable by
      # construction. The full suite already ran in the gate above; naming these here documents the
      # exact test→item mapping and fast-fails on the surfaces the owner explicitly tracks.
      #   item 4        dock PAUSE/MUTE + true-freeze wiring ....... tests/ui-lifecycle-static.test.ts
      #   items 3 & 13  live brains / firing neural readouts ....... tests/{brains,apex-brain,entity-brain,glyph-brain,mechalogodrom-brain}.test.ts
      #   item 7a       NHI bodies + social system ................. tests/{nhi,nhi-system}.test.ts
      #   item 7b       singularities (GR accretion/lensing) ....... tests/singularities.test.ts
      #   item 10       pantheon dome containment (no escape) ...... tests/alphabet-pantheon-render.test.ts
      #   items 15 & 16 plants ground-attach + touch response ...... tests/{vegetation,alien-flora}.test.ts
      #   item 18       temple/portal wormhole-horror .............. tests/monolith-temple.test.ts
      #   viz systems   shared render-system contracts ............. tests/viz-systems.test.ts
      - name: Owner-critical feature regression (real seals, no claims)
        run: >
          bun test
          tests/ui-lifecycle-static.test.ts
          tests/brains.test.ts tests/apex-brain.test.ts tests/entity-brain.test.ts
          tests/glyph-brain.test.ts tests/mechalogodrom-brain.test.ts
          tests/nhi.test.ts tests/nhi-system.test.ts
          tests/singularities.test.ts
          tests/alphabet-pantheon-render.test.ts
          tests/vegetation.test.ts tests/alien-flora.test.ts
          tests/monolith-temple.test.ts
          tests/viz-systems.test.ts

      # Build + headless smoke. No `|| echo` mask: if the build or smoke check fails, this step fails.
      - name: Build + headless smoke
        run: bun run smoke

  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    # Non-blocking: a perf regression should surface in the log, not fail the gate
    # (CI runners are noisier than the reference machine — see docs/BENCHMARKS-2026-06-26.md).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Run mitata benchmarks
        run: bun run bench

  dependency-review:
    name: Dependency review (PRs)
    # Supply-chain gate: flag known-vulnerable or malicious dependencies a PR would introduce, BEFORE
    # they merge (complements Dependabot, which only bumps what's already in). PR-only — it diffs the
    # base→head manifests; the public-repo dependency graph is free.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # post the review summary as a PR comment on failure
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  audit:
    name: Supply-chain audit (full tree)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Complements dependency-review (which only diffs a PR's NEW deps): bun audit scans the FULL
    # installed tree on every push/PR, so a CVE newly disclosed against an ALREADY-present dependency
    # is surfaced too — the class of advisory a PR-diff review structurally cannot see. Non-blocking
    # (like bench): a transitive LOW/MODERATE advisory is logged, not gate-failing; the second step
    # isolates the serious tier (drop continue-on-error to hard-gate on HIGH/CRITICAL).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Audit dependencies (all advisories — informational)
        run: bun audit
      - name: Flag HIGH/CRITICAL advisories
        run: bun audit --audit-level=high
