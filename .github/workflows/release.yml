name: Release

# CD: on a semver tag (e.g. `v0.7.2`), run the full gate, build the static bundle, package
# the deployable site (dist/ + the self-contained /lab artifact), and publish it as a GitHub
# Release asset. Works on private repos (no Pages plan required); a downloadable PoC build per
# version. Tag + push to trigger:  git tag v0.7.2 && git push origin v0.7.2
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Gate, build, package, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Full gate
        run: bun run check

      - name: Package site (dist + lab)
        run: |
          mkdir -p site/lab
          cp -r dist/* site/ 2>/dev/null || true
          cp lab/quantum-wildbeyond.html site/lab/index.html
          tar -czf cqm-${{ github.ref_name }}.tar.gz -C site .

      - name: Generate SBOM (CycloneDX, §21.420)
        run: bun run sbom > cqm-${{ github.ref_name }}-sbom.cdx.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
          files: |
            cqm-${{ github.ref_name }}.tar.gz
            cqm-${{ github.ref_name }}-sbom.cdx.json
