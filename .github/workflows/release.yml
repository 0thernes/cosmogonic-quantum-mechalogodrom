name: Release

# CD: on a semver tag (e.g. `v0.7.2`), run the full gate, build the static bundle, package
# the deployable site (dist/ + the self-contained /lab artifact), and publish it as a GitHub
# Release asset. Works on private repos (no Pages plan required); a downloadable PoC build per
# version.
#
# Trigger via tag push:    git tag v0.13.0 && git push origin v0.13.0
# Trigger via UI dispatch: Actions → Release → Run workflow → enter version (e.g. v0.13.0)
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag and release (e.g. v0.13.0)'
        required: true
        type: string

permissions:
  contents: write # create the GitHub Release + upload assets + push tag
  id-token: write # OIDC token for the Sigstore signing of the provenance attestation
  attestations: write # record the SLSA build-provenance attestation

# One release per tag at a time; never cancel — a half-uploaded asset is worse than a queued run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # When triggered manually, create the git tag first so the release job can use it.
  tag:
    name: Create git tag (manual dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version input
        id: set
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Ensure it starts with 'v'
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Version must match vX.Y.Z format (got: $VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "${{ steps.set.outputs.version }}" | grep -q .; then
            echo "::error::Tag ${{ steps.set.outputs.version }} already exists — aborting."
            exit 1
          fi

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.set.outputs.version }}" HEAD
          git push origin "${{ steps.set.outputs.version }}"

  release:
    name: Gate, build, package, publish
    # Run on tag push OR after the tag job above completes successfully.
    needs: [tag]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'workflow_dispatch' && needs.tag.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag name
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.ref.outputs.tag }}
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Full gate
        run: bun run check

      - name: Package site (dist + lab)
        run: |
          mkdir -p site/lab
          cp -r dist/* site/
          cp lab/quantum-wildbeyond.html site/lab/index.html
          tar -czf cqm-${{ steps.ref.outputs.tag }}.tar.gz -C site .

      - name: Generate SBOM (CycloneDX, §21.420)
        run: bun run sbom > cqm-${{ steps.ref.outputs.tag }}-sbom.cdx.json

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cqm-${{ steps.ref.outputs.tag }}.tar.gz
            cqm-${{ steps.ref.outputs.tag }}-sbom.cdx.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          generate_release_notes: true
          files: |
            cqm-${{ steps.ref.outputs.tag }}.tar.gz
            cqm-${{ steps.ref.outputs.tag }}-sbom.cdx.json
