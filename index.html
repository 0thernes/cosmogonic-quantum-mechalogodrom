<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;overflow:hidden;font-family:var(--font);touch-action:none;color:#b8c8e8}
canvas#c{display:block;position:fixed;inset:0;z-index:0}
.P{position:fixed;background:var(--bg);border:1px solid var(--brd);border-radius:var(--r);

.Pb{padding:8px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.P.col .Pb{display:none}.P.col .Pt{transform:rotate(-90deg)}
#sP{left:var(--g);top:calc(var(--g) + var(--sat));width:clamp(150px,24vw,220px)}

];

// ─── SORTING ALGORITHMS (behaviorally honest names) ───────
var ALGOS=[
  {name:'BUBBLE FIELD',    fn:function(a,i){if(a.length<2)return null;var j=i%(a.length-1);return a[j]>a[j+1]?[j,j+1]:null}},
  {name:'SELECTION SWEEP', fn:function(a,i){if(a.length<2)return null;var s=i%a.length,m=s;for(var k=s+1;k<a.length;k++)if(a[k]<a[m])m=k;return m!==s?[s,m]:null}},
  {name:'INSERTION PUSH',  fn:function(a,i){if(a.length<2)return null;var j=i%a.length;return j>0&&a[j]<a[j-1]?[j-1,j]:null}},
  {name:'MERGE IMPULSE',   fn:function(a,i){if(a.length<2)return null;var s=2<<(i%4),st=(i*s)%a.length,m=Math.min(st+Math.floor(s/2),a.length);return m>0&&m<a.length&&a[m]<a[m-1]?[m-1,m]:null}},
  {name:'PIVOT FIELD',     fn:function(a,i){if(a.length<2)return null;var p=a[a.length-1],j=i%a.length;return j<a.length-1&&a[j]>p?[j,a.length-1]:null}},
  {name:'HEAP SIFT',       fn:function(a,i){if(a.length<2)return null;var n=a.length,h=Math.max(1,n/2|0),j=i%h,l=2*j+1,r=2*j+2,g=j;if(l<n&&a[l]>a[g])g=l;if(r<n&&a[r]>a[g])g=r;return g!==j?[j,g]:null}},
  {name:'SHELL GAP',       fn:function(a,i){if(a.length<2)return null;var g=[5,3,1][i%3],j=(i*g)%a.length;return j+g<a.length&&a[j]>a[j+g]?[j,j+g]:null}},
  {name:'COCKTAIL WAVE',   fn:function(a,i){if(a.length<2)return null;var j=i%(a.length-1),d=Math.floor(i/a.length)%2,k=d?a.length-2-j:j;return k>=0&&k<a.length-1&&a[k]>a[k+1]?[k,k+1]:null}},
  {name:'COMB SWEEP',      fn:function(a,i){if(a.length<2)return null;var g=Math.floor(a.length/1.3);for(var k=0;k<i%3;k++)g=Math.max(1,Math.floor(g/1.3));var j=(i*g)%a.length;return j+g<a.length&&a[j]>a[j+g]?[j,j+g]:null}},

  {name:'BITONIC MESH',    fn:function(a,i){if(a.length<2)return null;var k=2<<(i%4),j=(i*2)%a.length,p=j^(k>>1);return p>0&&p<a.length&&j<p&&a[j]>a[p]?[j,p]:null}},
  {name:'STOOGE DRIFT',    fn:function(a,i){if(a.length<2)return null;var j=i%a.length,e=Math.min(j+2,a.length-1);return a[j]>a[e]?[j,e]:null}},
  {name:'ODD-EVEN PULSE',  fn:function(a,i){if(a.length<2)return null;var p=i%2;for(var j=p;j<a.length-1;j+=2)if(a[j]>a[j+1])return[j,j+1];return null}},
  {name:'COUNT PHASE',     fn:function(a,i){if(a.length<2)return null;var j=i%a.length,t=(i+1)%a.length;return j!==t&&a[j]>a[t]?[j,t]:null}},
  {name:'RADIX PHASE',     fn:function(a,i){if(a.length<2)return null;var d=Math.pow(10,i%3),j=i%a.length,k=(j+1)%a.length;return Math.floor(a[j]/d)%10>Math.floor(a[k]/d)%10?[j,k]:null}},

var ents=[];

function disposeEntity(e){
  scene.remove(e);
  // Geometry is SHARED from cachedGeos — must NOT dispose
  // Material is per-entity — MUST dispose to prevent GPU leak
  if(e.material){
    if(Array.isArray(e.material)){e.material.forEach(function(m){m.dispose()})}
    else{e.material.dispose()}
  }
}

function remorphEntity(e, newMi){
  // TRUE morphogenesis: swap geometry ref + full material update
  // Cheaper than disposeEntity+mkE: reuses mesh and scene slot
  var nm=MT[newMi%100];
  e.geometry=cachedGeos[nm.gi]; // geometry swap — zero allocation
  e.material.color.copy(nm.col);
  e.material.emissive.copy(nm.em);
  e.material.emissiveIntensity=nm.emI;
  e.material.metalness=nm.met;
  e.material.roughness=nm.rou;
  var isSp=nm.op<0.6;
  e.material.transparent=isSp;
  e.material.opacity=isSp?nm.op:1.0;
  e.material.side=isSp?THREE.DoubleSide:THREE.FrontSide;
  e.material.wireframe=wireMode;
  e.material.needsUpdate=true;
  e.userData.mi=newMi%100;
  e.userData.beh=nm.beh;
  e.userData.spd=nm.spd;
  e.userData.wf=0.3+rng()*6;
  e.userData.wa=0.03+rng()*0.5;
  e.scale.setScalar(e.userData.sc);
}

var SG=(function(){
  var CS=8, cells=Object.create(null), pool=[];
  return {
    clear:function(){var ks=Object.keys(cells);for(var i=0;i<ks.length;i++){cells[ks[i]].length=0;pool.push(cells[ks[i]])}cells=Object.create(null)},
    insert:function(e){var kx=(e.position.x/CS)|0,kz=(e.position.z/CS)|0,key=kx*10007+kz;if(!cells[key])cells[key]=pool.length?pool.pop():[];cells[key].push(e)},
    query:function(x,z,r){var cr=Math.ceil(r/CS),cx=(x/CS)|0,cz=(z/CS)|0,res=[];for(var dx=-cr;dx<=cr;dx++)for(var dz=-cr;dz<=cr;dz++){var c=cells[(cx+dx)*10007+(cz+dz)];if(c)for(var i=0;i<c.length;i++)res.push(c[i])}return res}
  };
})();

    var ft=t*0.06;cam.position.set(sin(ft)*45+cos(ft*1.3)*22,16+sin(ft*0.4)*22,cos(ft)*45+sin(ft*0.7)*28);cam.lookAt(sin(ft*0.3)*12,5+sin(ft*0.5)*12,cos(ft*0.3)*12);
  } else {cam.position.set(0,90,0);cam.lookAt(0,0,0);cam.rotation.z=t*0.015}

  if(keys[' ']&&fc%12===0)doBurst();if(keys.shift&&fc%20===0)doSplit();if(keys.m&&fc%30===0)doMutate();
  if(keys.tab)chaos=clamp(chaos+dt*2,CHAOS_MIN,CHAOS_MAX);
  chaos=Math.max(CHAOS_MIN,chaos-dt*0.005);

  // Environment + NPCs + Shoggoths
  applyWeather(dt,t);updatePMs(dt,t);
  // Grid rebuild every 2 frames — halves O(n) rebuild cost
  if(fc%2===0){SG.clear();for(var gi=0;gi<ents.length;gi++)SG.insert(ents[gi])}
  updateShogs(dt,t);

  // Sector
  var camX=cam.position.x, camY=cam.position.y, camZ=cam.position.z, sec='NEXUS PRIME';
  if(abs(camZ+65)<22&&abs(camX)<22)sec='SPIRE DISTRICT';
  else if(camY>28)sec='DIORAMA BELT';
  else if(abs(camX)>45)sec='OUTER RING';
  else if(camZ>18)sec='GENESIS FIELD';
  else if(abs(camZ+35)<18)sec='MONOLITH ARRAY';
  if(sec!==lastSec){lastSec=sec;showS(sec)}

  // Sorting — pre-allocated typed array, no GC
  if(ents.length>=2){
    var al=ALGOS[algoIdx]; algoStep++;
    for(var si=0;si<ents.length;si++)sortValsTA[si]=ents[si].userData.sortVal;
    var sv={length:ents.length};for(var si=0;si<ents.length;si++)sv[si]=sortValsTA[si];
    var sw=al.fn(sv,algoStep);
    if(sw&&sw[0]>=0&&sw[1]<ents.length&&sw[0]!==sw[1]){
      var ea=ents[sw[0]],eb=ents[sw[1]];var tv=ea.userData.sortVal;ea.userData.sortVal=eb.userData.sortVal;eb.userData.sortVal=tv;
      V1.copy(eb.position).sub(ea.position).normalize().multiplyScalar(0.04*cm);ea.userData.vel.add(V1);V1.negate();eb.userData.vel.add(V1);
      ea.material.emissiveIntensity=2;eb.material.emissiveIntensity=2;
    }
    document.getElementById('a-name').textContent=al.name;
    document.getElementById('a-step').textContent='step '+algoStep+(sw?' \u21C4':'');
  }

  // Entity loop
  var energy=0; var mSet=new Set(); var windScale=cm*0.0005;
  for(var i=ents.length-1;i>=0;i--){
    var e=ents[i], u=e.userData; u.age+=dt*30; mSet.add(u.mi);
    var sp2=u.spd*cm;
    // Precompute repeated trig
    var wfph=t*u.wf+u.ph, sinWF=sin(wfph), cosWF=cos(wfph);
    // Theory behaviors stagger: alternate entities each frame
    var doTheory=(fc+i)%2===0;

    var b=u.beh;
    if(b==='drift'){u.vel.x+=sinWF*0.002*sp2;u.vel.z+=cos(t*u.wf*0.7+u.ph)*0.002*sp2}
    else if(b==='orbit'){var oa=t*sp2*0.3+u.ph;u.vel.x+=cos(oa)*0.003;u.vel.z+=sin(oa)*0.003}
    else if(b==='pulse'){e.scale.setScalar(u.sc*(1+sinWF*u.wa*cm*2))}
    else if(b==='swarm'){u.vel.x+=(sin(t*0.1)*10-e.position.x)*0.0003*sp2;u.vel.z+=(cos(t*0.1)*10-e.position.z)*0.0003*sp2}
    else if(b==='spiral'){u.vel.x+=cos(t*sp2+u.ph)*0.004;u.vel.y+=sin(t*sp2*0.5)*0.002;u.vel.z+=sin(t*sp2+u.ph)*0.004}
    else if(b==='expand'){V1.copy(e.position).normalize().multiplyScalar(0.0005*sp2);u.vel.add(V1)}
    else if(b==='coil'){u.vel.x+=sin(t*3*sp2+u.ph)*0.003;u.vel.y+=cos(t*2*sp2+u.ph)*0.002}
    else if(b==='hunt'){var hnd=9999,hnx=0,hnz=0;for(var mi=0;mi<mCfg.length;mi++){var mc=mCfg[mi],hdd=((e.position.x-mc[0])*(e.position.x-mc[0])+(e.position.z-mc[1])*(e.position.z-mc[1]));if(hdd<hnd){hnd=hdd;hnx=mc[0];hnz=mc[1]}}if(hnd>25){u.vel.x+=(hnx-e.position.x)*0.0001*sp2;u.vel.z+=(hnz-e.position.z)*0.0001*sp2}}
    else if(b==='flee'){V1.copy(e.position).normalize().multiplyScalar(0.0003*sp2);u.vel.add(V1);if(e.position.lengthSq()>3025)u.vel.multiplyScalar(0.9)}
    else if(b==='split'){if(u.age>100&&rng()<0.001*cm&&ents.length<MAX_E){var ch2=mkE(V2.copy(e.position),u.mi,0.5);if(ch2)ch2.userData.vel.set((rng()-0.5)*0.2,(rng()-0.5)*0.2,(rng()-0.5)*0.2)}}
    else if(b==='zigzag'){u.vel.x+=sin(t*8+u.ph)*0.004*sp2;u.vel.z+=cos(t*8+u.ph+PI/2)*0.004*sp2}
    else if(b==='sine'){u.vel.y+=sinWF*0.003*sp2}
    else if(b==='bounce'){if(e.position.y<-8)u.vel.y=abs(u.vel.y)*0.8+0.05;u.vel.y-=0.001}
    else if(b==='flock'){
      var fx=0,fz=0,fn=0,fNb=SG.query(e.position.x,e.position.z,8);
      for(var ni=0;ni<fNb.length;ni++){var ne=fNb[ni];if(ne===e)continue;var fdx=ne.position.x-e.position.x,fdz=ne.position.z-e.position.z;if(fdx*fdx+fdz*fdz<64){fx+=fdx;fz+=fdz;fn++}}
      if(fn>0){u.vel.x+=fx/fn*0.0002*sp2;u.vel.z+=fz/fn*0.0002*sp2}
    }
    else if(b==='scatter'){u.vel.x+=(rng()-0.5)*0.01*sp2;u.vel.z+=(rng()-0.5)*0.01*sp2}
    else if(b==='vortex'){var vd=e.position.length()||1;u.vel.x+=(-e.position.z/vd)*0.003*sp2;u.vel.z+=(e.position.x/vd)*0.003*sp2;u.vel.y+=sin(t+u.ph)*0.001}
    else if(b==='lattice'){u.vel.x+=(Math.round(e.position.x/4)*4-e.position.x)*0.002*sp2;u.vel.z+=(Math.round(e.position.z/4)*4-e.position.z)*0.002*sp2}
    else if(b==='wave'){u.vel.y+=sin(e.position.x*0.3+t*2+u.ph)*0.003*sp2;u.vel.x+=cosWF*0.001*sp2}
    else if(b==='helix'){var ha=t*sp2+u.ph;u.vel.x+=cos(ha)*0.003;u.vel.z+=sin(ha)*0.003;u.vel.y+=sin(ha*0.5)*0.002}
    else if(b==='quantum'){u.qP+=dt*u.wf;var qc=sin(u.qP)*cos(u.qP*1.618);u.vel.x+=qc*0.003*sp2;u.vel.z+=sin(u.qP*0.7)*0.003*sp2;u.vel.y+=cos(u.qP*1.3)*0.002*sp2;if(rng()<0.005*cm)u.vel.set((rng()-0.5)*0.3,(rng()-0.5)*0.2,(rng()-0.5)*0.3)}
    // Theory behaviors — staggered, spatial grid, squared distance
    else if(doTheory&&b==='nash'){
      var nNb=SG.query(e.position.x,e.position.z,10);
      for(var ni=0;ni<nNb.length;ni++){var ne=nNb[ni];if(ne===e)continue;if(d2xz(e.position,ne.position)<100){var pay=u.strategy===0?(ne.userData.strategy===0?3:0):(ne.userData.strategy===0?5:1);u.payoff=pay;V1.copy(ne.position).sub(e.position).normalize().multiplyScalar(ne.userData.strategy===0?0.001*sp2:-0.0008*sp2);u.vel.add(V1)}}
      if(u.payoff<1.5&&rng()<0.01*cm)u.strategy=1-u.strategy;
    }
    else if(doTheory&&b==='market'){
      u.energy+=(rng()-0.5)*cm*0.5;u.energy=clamp(u.energy,0,100);e.scale.setScalar(u.sc*(0.5+u.energy/100));
      var mNb=SG.query(e.position.x,e.position.z,12);
      for(var ni=0;ni<mNb.length;ni++){var ne=mNb[ni];if(ne===e)continue;if(d2xz(e.position,ne.position)<144){var diff=ne.userData.energy-u.energy;if(abs(diff)>20){V1.copy(ne.position).sub(e.position).normalize().multiplyScalar(diff*0.00005*sp2);u.vel.add(V1);u.energy+=diff*0.01;ne.userData.energy-=diff*0.01}}}
    }
    else if(doTheory&&b==='typemorph'){
      var tNb=SG.query(e.position.x,e.position.z,10);
      for(var ni=0;ni<tNb.length;ni++){var ne=tNb[ni];if(ne===e)continue;if(d2xz(e.position,ne.position)<100){var same=u.typeId===ne.userData.typeId,sub=abs(u.typeId-ne.userData.typeId)===1;V1.copy(ne.position).sub(e.position).normalize().multiplyScalar((same?0.002:sub?0.0005:-0.0003)*sp2);u.vel.add(V1)}}
    }
    else if(doTheory&&b==='setunion'){
      var sNb=SG.query(e.position.x,e.position.z,15);V2.set(0,0,0);var scnt=0;
      for(var ni=0;ni<sNb.length;ni++){var ne=sNb[ni];if(ne===e)continue;var sdd=d2xz(e.position,ne.position);if(ne.userData.setGroup===u.setGroup&&sdd<225){V2.add(ne.position);scnt++}else if(ne.userData.setGroup!==u.setGroup&&sdd<36){V1.copy(e.position).sub(ne.position).normalize().multiplyScalar(0.002*sp2);u.vel.add(V1)}}
      if(scnt>0){V2.divideScalar(scnt).sub(e.position).normalize().multiplyScalar(0.001*sp2);u.vel.add(V2)}
    }
    else if(doTheory&&b==='graphseek'){
      var gNb=SG.query(e.position.x,e.position.z,16);var minD2=9999,minE=null;
      for(var ni=0;ni<gNb.length;ni++){var ne=gNb[ni];if(ne===e)continue;var gdd=d2(e.position,ne.position);if(gdd<minD2&&gdd>2.25){minD2=gdd;minE=ne}}
      if(minE){var minD=sqrt(minD2),optD=4+u.typeId;V1.copy(minE.position).sub(e.position).normalize().multiplyScalar((minD-optD)*0.0008*sp2);u.vel.add(V1)}
    }
    else if(b==='lorenz'){
      var lx=e.position.x*0.1,ly=(e.position.y+10)*0.1,lz=e.position.z*0.1;
      u.vel.x+=10*(ly-lx)*dt*0.002*sp2;u.vel.y+=(lx*(28-lz)-ly)*dt*0.001*sp2;u.vel.z+=(lx*ly-2.667*lz)*dt*0.002*sp2;
      if(rng()<0.01*cm){V1.set((rng()-0.5)*0.1,(rng()-0.5)*0.05,(rng()-0.5)*0.1);u.vel.add(V1)}
    }

    // Neural activation
    u.act*=0.95;u.act+=cm*0.01*sinWF;
    if(u.act>1)e.material.emissiveIntensity=Math.min(e.material.emissiveIntensity+0.1,2.5);
    else e.material.emissiveIntensity=lerp(e.material.emissiveIntensity,MT[u.mi].emI,dt*2);

    // Physics — wind from environment
    u.vel.x+=(rng()-0.5)*0.003*cm+windVec.x*windScale;
    u.vel.y+=(rng()-0.5)*0.0015*cm;
    u.vel.z+=(rng()-0.5)*0.003*cm+windVec.z*windScale;
    u.vel.multiplyScalar(0.98);
    V1.copy(u.vel).multiplyScalar(dt*60);e.position.add(V1);
    e.rotation.x+=sinWF*0.012*sp2*0.4;e.rotation.y+=cosWF*0.01*sp2*0.35;e.rotation.z+=sin(wfph+1)*0.007*sp2;

    // Belly
    if(u.belly>0){u.belly-=dt*30;e.material.emissiveIntensity=1.5+sin(t*8)*0.5;e.scale.x=u.sc*(1+sin(t*6)*0.4);e.scale.y=u.sc*(1+cos(t*5)*0.3);e.scale.z=u.sc;if(u.belly<=0)e.scale.setScalar(u.sc)}

    // Containment — squared distance (no sqrt)
    if(e.position.lengthSq()>4225){V1.copy(e.position).normalize().multiplyScalar(-0.005);u.vel.add(V1)}
    if(e.position.y<-9)u.vel.y+=0.01;if(e.position.y>40)u.vel.y-=0.005;
    energy+=u.vel.length();

    // Auto-split
    u.sT-=dt*30*cm;
    if(u.sT<=0&&ents.length<MAX_E&&rng()<0.06){u.sT=300+rng()*500;mkE(V2.copy(e.position).add(V3.set((rng()-0.5)*2,rng(),(rng()-0.5)*2)),(u.mi+Math.floor(rng()*5))%100,0.7)}

    // Death — temperature modifies lifespan
    var tMod=temperature<0?0.7:temperature>30?1.3:1.0;
    if(u.age>u.life*tMod){
      disposeEntity(e);ents.splice(i,1);
      if(ents.length<100)for(var rj=0;rj<3;rj++)mkE(new THREE.Vector3((rng()-0.5)*40+e.position.x*0.3,rng()*3,(rng()-0.5)*40+e.position.z*0.3),Math.floor(rng()*100));
    }
  }

  // Neural net — O(n·k) via spatial grid, no distanceTo
  if(fc%(ents.length>700?3:ents.length>400?2:1)===0){
    var wI=0;
    for(var ni=0;ni<ents.length&&wI<MNN;ni+=2){
      var ea2=ents[ni];var nnNb=SG.query(ea2.position.x,ea2.position.z,8);
      for(var nj=0;nj<nnNb.length&&wI<MNN;nj++){
        var eb2=nnNb[nj];if(eb2===ea2)continue;
        var ndx=ea2.position.x-eb2.position.x,ndy=ea2.position.y-eb2.position.y,ndz=ea2.position.z-eb2.position.z;
        var nd2=ndx*ndx+ndy*ndy+ndz*ndz;
        if(nd2<64){var nd=sqrt(nd2);var idx=wI*6;
          nnPos[idx]=ea2.position.x;nnPos[idx+1]=ea2.position.y;nnPos[idx+2]=ea2.position.z;
          nnPos[idx+3]=eb2.position.x;nnPos[idx+4]=eb2.position.y;nnPos[idx+5]=eb2.position.z;
          var nI=1-nd*0.125,nw=(ea2.userData.nW+eb2.userData.nW)*0.5;
          eb2.userData.act+=ea2.userData.act*nw*0.01;
          tmpC.setHSL((t*0.04+nw*0.5)%1,0.75,0.25+nI*0.45);
          nnCol[idx]=tmpC.r;nnCol[idx+1]=tmpC.g;nnCol[idx+2]=tmpC.b;
          nnCol[idx+3]=tmpC.r;nnCol[idx+4]=tmpC.g;nnCol[idx+5]=tmpC.b;wI++}
      }
    }
    connLinks=wI;
    nnLines.geometry.attributes.position.needsUpdate=true;
    nnLines.geometry.attributes.color.needsUpdate=true;
    nnLines.geometry.setDrawRange(0,wI*2);
  }

  // Quantum cloud
  var qs=0;
  for(var qi=0;qi<QPC;qi++){
    var qv=qVels[qi],psi=sin(qv.p+t*qv.f)*qv.a;
    qPos[qi*3]+=qv.x*cm*dt*60+psi*cm*sin(t*0.7+qi*0.01);
    qPos[qi*3+1]+=qv.y*cm*dt*60+cos(t*0.5+qi*0.003)*qv.a*cm*0.5;
    qPos[qi*3+2]+=qv.z*cm*dt*60+psi*cm*cos(t*0.3+qi*0.02);
    if(qv.cl){qv.ct+=dt;if(qv.ct>2){qv.cl=false;qv.ct=0;qPos[qi*3]=(rng()-0.5)*60;qPos[qi*3+1]=rng()*30-8;qPos[qi*3+2]=(rng()-0.5)*60;tmpC.setHSL(rng(),0.7,0.5);qCol[qi*3]=tmpC.r;qCol[qi*3+1]=tmpC.g;qCol[qi*3+2]=tmpC.b}}
    else if(rng()<0.0005*cm){qv.cl=true;qv.ct=0}
    qv.p+=dt*qv.f;qs+=abs(psi);
    if(qPos[qi*3]*qPos[qi*3]+qPos[qi*3+2]*qPos[qi*3+2]>3600||abs(qPos[qi*3+1])>38){qPos[qi*3]=(rng()-0.5)*35;qPos[qi*3+1]=rng()*22-5;qPos[qi*3+2]=(rng()-0.5)*35}
    if(fc%6===0){tmpC.setHSL((t*0.02+qv.p*0.1)%1,0.5+Math.min(abs(psi)*3,1),0.3+Math.min(abs(psi)*2,0.7));qCol[qi*3]=tmpC.r;qCol[qi*3+1]=tmpC.g;qCol[qi*3+2]=tmpC.b}
  }
  qSig=qs/QPC;
  qGeo.attributes.position.needsUpdate=true;
  if(fc%6===0)qGeo.attributes.color.needsUpdate=true;

  // Pipelines
  for(var pi=0;pi<pipes.length;pi++){var pp=pipes[pi];for(var pj=0;pj<pp.pkts.length;pj++){var pkt=pp.pkts[pj];pkt.userData.t=(pkt.userData.t+pkt.userData.spd*dt)%1;pkt.position.copy(pkt.userData.cu.getPointAt(pkt.userData.t));pkt.rotation.x+=dt*3;pkt.rotation.y+=dt*2;pkt.material.opacity=0.4+sin(t*5+pkt.userData.t*TAU)*0.3}pp.tb.material.opacity=0.1+sin(t*2)*0.05*cm;pp.tb.material.emissiveIntensity=0.2+sin(t*3)*0.15*cm}

  // Monoliths
  for(var mi=0;mi<mGr.children.length;mi++){var mg=mGr.children[mi];if(!mg.userData.bc)continue;mg.userData.bc.intensity=2+sin(t*2+mg.userData.hue*10)*2*cm;for(var ci=0;ci<mg.children.length;ci++){var ch3=mg.children[ci];if(ch3.userData&&ch3.userData.rs!==undefined){var ax=ch3.userData.ra;if(ax===0)ch3.rotation.x=t*ch3.userData.rs;else if(ax===1)ch3.rotation.y=t*ch3.userData.rs;else ch3.rotation.z=t*ch3.userData.rs}}}

  // Dioramas
  for(var di=0;di<dios.length;di++){var dio=dios[di];dio.rotation.y+=dio.userData.rs*dt*0.2;dio.position.y+=sin(t*0.3+dio.userData.hue*20)*0.004;var mcs=dio.userData.mg.children;for(var mi2=0;mi2<mcs.length;mi2++){var mu=mcs[mi2].userData;mu.o+=mu.s*dt;mcs[mi2].position.x=cos(mu.o)*mu.a;mcs[mi2].position.y=mu.bY+sin(t*mu.s+mu.o)*0.3;mcs[mi2].position.z=sin(mu.o)*mu.a;mcs[mi2].rotation.x+=dt*mu.s;mcs[mi2].rotation.y+=dt*mu.s*0.7}dio.userData.gl.intensity=1.5+sin(t*2+dio.userData.hue*10)*cm}

  // Lights
  lts[0].intensity=2+sin(t*1.5)*1.5*cm;lts[1].intensity=2+cos(t*1.2)*cm;lts[2].intensity=2+sin(t*2.3)*1.5;
  lts[3].intensity=4+sin(t*4)*2*cm;lts[3].color.setHSL((t*0.1)%1,0.8,0.5);
  lts[4].intensity=1+sin(t*3)*cm*2;lts[5].intensity=1.5+cos(t*1.8)*cm;lts[5].position.x=sin(t*0.2)*18;lts[5].position.z=cos(t*0.2)*18;

  // Stats
  if(fc%8===0){
    document.getElementById('v0').textContent=ents.length+'/'+MAX_E;
    document.getElementById('v1').textContent=chaos.toFixed(1);
    document.getElementById('v2').textContent=energy.toFixed(0);
    document.getElementById('v3').textContent=connLinks;
    document.getElementById('v4').textContent=mSet.size+'/100';
    document.getElementById('v5').textContent=ALGOS[algoIdx].name;
    document.getElementById('v6').textContent=qSig.toFixed(3);
    document.getElementById('v7').textContent=SONGS[songIdx].name;
    document.getElementById('ew').textContent=WEATHERS[weatherIdx];
    document.getElementById('ewi').textContent=sqrt(windVec.x*windVec.x+windVec.z*windVec.z).toFixed(1);
    document.getElementById('et').textContent=temperature.toFixed(0)+'C';
    document.getElementById('es').textContent=shogs.length;
    document.getElementById('ep').textContent=PMS.length;
    pushG(gD[0],ents.length);pushG(gD[1],chaos*10);pushG(gD[2],energy);pushG(gD[3],connLinks);
  }
  if(fc%18===0){
    drawGraph('g0',gD[0],'rgba(0,200,255,1)',MAX_E);drawGraph('g1',gD[1],'rgba(255,80,0,1)',100);
    drawGraph('g2',gD[2],'rgba(100,255,100,1)',0);drawGraph('g3',gD[3],'rgba(255,255,0,1)',MNN);
  }
  ren.render(scene,cam);
}
loop();
window.addEventListener('resize',function(){W=innerWidth;H=innerHeight;cam.aspect=W/H;cam.updateProjectionMatrix();ren.setSize(W,H)});

</script>
