name: CI

# The full gate (docs/CONTRIBUTING.md): prettier → tsc strict → oxlint → bun test → build.
# Runs on every push to the default branch and every PR. `workflow_dispatch` allows a manual
# run from the Actions tab. Concurrency cancels superseded runs on the same ref.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    name: Full gate (format · types · lint · test · build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14' # pinned for reproducible CI; bump in lockstep with local

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck (tsc --strict)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Unit tests (bun test)
        run: bun test

      - name: Production build
        run: bun run build

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    # Non-blocking: a perf regression should surface in the log, not fail the gate
    # (CI runners are noisier than the reference machine — see docs/BENCHMARKS.md).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Run mitata benchmarks
        run: bun run bench
