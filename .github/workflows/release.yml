name: Release

# CD: on a semver tag (e.g. `v0.7.2`), run the full gate, build the static bundle, package
# the deployable site (the same `site/` artifact assembled for GitHub Pages: app + docs/spec/bible
# + lab/consciousness/sentience + copied docs/ report targets), and publish it as a GitHub Release
# asset. Works on private repos (no Pages plan required); a downloadable PoC build per version.
#
# Trigger via tag push:    git tag v0.13.0 && git push origin v0.13.0
# Trigger via UI dispatch: Actions → Release → Run workflow → enter version (e.g. v0.13.0)
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to tag and release (e.g. v0.13.0)'
        required: true
        type: string

permissions:
  contents: write # create the GitHub Release + upload assets + push tag
  id-token: write # OIDC token for the Sigstore signing of the provenance attestation
  attestations: write # record the SLSA build-provenance attestation

# One release per tag at a time; never cancel — a half-uploaded asset is worse than a queued run.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # When triggered manually, create the git tag first so the release job can use it.
  tag:
    name: Create git tag (manual dispatch only)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Validate version input
        id: set
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          VERSION="$REQUESTED_VERSION"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match vX.Y.Z format (got: $VERSION)"
            exit 1
          fi
          PACKAGE_TAG="v$(node -p "require('./package.json').version")"
          if [ "$VERSION" != "$PACKAGE_TAG" ]; then
            echo "::error::Requested tag $VERSION does not match package.json ($PACKAGE_TAG)."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag state
        id: tagstate
        env:
          TAG: ${{ steps.set.outputs.version }}
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            EXISTING_SHA="$(git rev-list -n 1 "$TAG")"
            if [ "$EXISTING_SHA" != "$HEAD_SHA" ]; then
              echo "::error::Tag $TAG already exists at $EXISTING_SHA, not current HEAD $HEAD_SHA."
              exit 1
            fi
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists at current HEAD; release job will publish it."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist; creating it."
          fi

      - name: Set up Bun before mutating tag state
        if: steps.tagstate.outputs.exists == 'false'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install and gate before creating a tag
        if: steps.tagstate.outputs.exists == 'false'
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run generated:check

      - name: Create and push tag
        if: steps.tagstate.outputs.exists == 'false'
        env:
          TAG: ${{ steps.set.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" HEAD
          git push origin "$TAG"

  release:
    name: Gate, build, package, publish
    # Run on tag push OR after the tag job above completes successfully.
    needs: [tag]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/') ||
       (github.event_name == 'workflow_dispatch' && needs.tag.result == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Resolve tag name
        id: ref
        env:
          PUSHED_TAG: ${{ github.ref_name }}
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$REQUESTED_VERSION"
          else
            TAG="$PUSHED_TAG"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z (got: $TAG)."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout at tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.ref.outputs.tag }}
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Validate checked-out tag against package manifest
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.tag }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must match vX.Y.Z (got: $RELEASE_TAG)."
            exit 1
          fi
          PACKAGE_TAG="v$(node -p "require('./package.json').version")"
          if [ "$RELEASE_TAG" != "$PACKAGE_TAG" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package.json ($PACKAGE_TAG)."
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Full gate
        run: bun run check

      - name: Generated artifact freshness
        run: bun run generated:check

      - name: Assemble and package Pages-equivalent site
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.tag }}
        run: |
          bun run pages
          tar -czf "cqm-${RELEASE_TAG}.tar.gz" -C site .

      - name: Generate SBOM (CycloneDX, §21.420)
        env:
          RELEASE_TAG: ${{ steps.ref.outputs.tag }}
        run: bun run sbom > "cqm-${RELEASE_TAG}-sbom.cdx.json"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            cqm-${{ steps.ref.outputs.tag }}.tar.gz
            cqm-${{ steps.ref.outputs.tag }}-sbom.cdx.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.ref.outputs.tag }}
          generate_release_notes: true
          files: |
            cqm-${{ steps.ref.outputs.tag }}.tar.gz
            cqm-${{ steps.ref.outputs.tag }}-sbom.cdx.json
