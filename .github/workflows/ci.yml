name: CI

# The full gate (CONTRIBUTING.md): prettier → tsc strict → oxlint → bun test+coverage →
# verify:receipts → sync:check → verify:facts → build.
# Runs on every push to the default branch and every PR. `workflow_dispatch` allows a manual
# run from the Actions tab. Concurrency cancels superseded runs on the same ref.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static-linux:
    name: Static analysis (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Static gate (prettier + tsc + oxlint)
        run: bun run check:static

  gate-linux:
    name: Full gate (ubuntu — tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Unit tests + coverage + receipts law
        run: bun run verify:receipts

      - name: Surface sync check (version + receipts propagated to every MD/HTML)
        run: bun run sync:check

      - name: Cross-surface fact audit (no canonical-fact drift across surfaces)
        run: bun run verify:facts

      - name: Generated file-map freshness
        run: bun run filemap:check

      - name: Production build
        run: bun run build

      - name: Generated artifact freshness
        run: bun run generated:check

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-ubuntu-latest-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

      - name: Owner-critical feature regression (real seals, no claims)
        run: >
          bun test
          tests/ui-lifecycle-static.test.ts
          tests/brains.test.ts tests/apex-brain.test.ts tests/entity-brain.test.ts
          tests/glyph-brain.test.ts tests/mechalogodrom-brain.test.ts
          tests/nhi.test.ts tests/nhi-system.test.ts
          tests/singularities.test.ts
          tests/alphabet-pantheon-render.test.ts
          tests/vegetation.test.ts tests/alien-flora.test.ts
          tests/monolith-temple.test.ts
          tests/viz-systems.test.ts
          tests/perf-budget.test.ts

      - name: Build + headless smoke
        run: bun run smoke

  gate:
    name: Full gate (windows)
    strategy:
      fail-fast: false
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14' # pinned for reproducible CI; bump in lockstep with local

      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Format check (prettier)
        run: bun run format:check

      - name: Typecheck (tsc --strict)
        run: bun run typecheck

      - name: Lint (oxlint)
        run: bun run lint

      - name: Unit tests + coverage + receipts law
        # The verifier owns the child process, preserves its exit code, and parses the same transcript.
        run: bun run verify:receipts

      - name: Surface sync check (version + receipts propagated to every MD/HTML)
        run: bun run sync:check

      - name: Cross-surface fact audit (no canonical-fact drift across surfaces)
        run: bun run verify:facts

      - name: Generated file-map freshness
        run: bun run filemap:check

      - name: Production build
        run: bun run build

      - name: Generated artifact freshness
        run: bun run generated:check

      - name: Upload dist artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist-windows-latest-${{ github.sha }}
          path: dist/
          if-no-files-found: ignore
          retention-days: 14

      # Owner-critical feature regression gate. This step makes NO unverifiable claims: it runs the
      # actual behavioral/contract test files that back each owner-requested feature. If any feature
      # regresses (or a seal file is renamed/deleted), this step FAILS LOUDLY — it is falsifiable by
      # construction. The full suite already ran in the gate above; naming these here documents the
      # exact test→item mapping and fast-fails on the surfaces the owner explicitly tracks.
      #   item 4        dock PAUSE/MUTE + true-freeze wiring ....... tests/ui-lifecycle-static.test.ts
      #   items 3 & 13  live brains / firing neural readouts ....... tests/{brains,apex-brain,entity-brain,glyph-brain,mechalogodrom-brain}.test.ts
      #   item 7a       NHI bodies + social system ................. tests/{nhi,nhi-system}.test.ts
      #   item 7b       singularities (GR accretion/lensing) ....... tests/singularities.test.ts
      #   item 10       pantheon dome containment (no escape) ...... tests/alphabet-pantheon-render.test.ts
      #   items 15 & 16 plants ground-attach + touch response ...... tests/{vegetation,alien-flora}.test.ts
      #   item 18       temple/portal wormhole-horror .............. tests/monolith-temple.test.ts
      #   viz systems   shared render-system contracts ............. tests/viz-systems.test.ts
      - name: Owner-critical feature regression (real seals, no claims)
        run: >
          bun test
          tests/ui-lifecycle-static.test.ts
          tests/brains.test.ts tests/apex-brain.test.ts tests/entity-brain.test.ts
          tests/glyph-brain.test.ts tests/mechalogodrom-brain.test.ts
          tests/nhi.test.ts tests/nhi-system.test.ts
          tests/singularities.test.ts
          tests/alphabet-pantheon-render.test.ts
          tests/vegetation.test.ts tests/alien-flora.test.ts
          tests/monolith-temple.test.ts
          tests/viz-systems.test.ts

      # Build + headless smoke. No `|| echo` mask: if the build or smoke check fails, this step fails.
      - name: Build + headless smoke
        run: bun run smoke

  native:
    name: Native C++ build + APEX reproduction
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install OpenGL/GLFW build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgl1-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev

      - name: Set up Bun for the cross-language oracle
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'

      - name: Configure immutable native dependencies
        run: >
          cmake -S native -B native/build-ci
          -DCMAKE_BUILD_TYPE=Release
          -DCQM_WITH_JOLT=OFF
          -DCQM_WITH_IMGUI=OFF
          -DGLFW_BUILD_WAYLAND=OFF
          -DBUILD_TESTING=ON

      - name: Build native engine and reproduction gate
        run: cmake --build native/build-ci --parallel 2

      - name: Run native reproduction tests
        run: ctest --test-dir native/build-ci --output-on-failure

      - name: Compare native vectors to the live TypeScript oracle
        run: bun scripts/verify-native-apex.ts native/build-ci/cqm_apex_golden

      - name: Configure the default Jolt-enabled engine
        run: >
          cmake -S native -B native/build-jolt-ci
          -DCMAKE_BUILD_TYPE=Release
          -DCQM_WITH_IMGUI=OFF
          -DGLFW_BUILD_WAYLAND=OFF
          -DBUILD_TESTING=OFF

      - name: Build the default Jolt-enabled engine
        run: cmake --build native/build-jolt-ci --target cqm_native --parallel 2

  bench:
    name: Benchmarks (informational)
    runs-on: ubuntu-latest
    needs: gate
    timeout-minutes: 10
    # Non-blocking: a perf regression should surface in the log, not fail the gate
    # (CI runners are noisier than the reference machine — see docs/BENCHMARKS-2026-06-26.md).
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # don't leave the GITHUB_TOKEN in .git/config (supply-chain hardening)
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Run mitata benchmarks (bounded, informational)
        run: |
          set +e
          timeout 240s bun run bench
          status=$?
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if [ "$status" -eq 124 ]; then
            echo "::warning::mitata benchmarks exceeded the 240s informational cap; gate remains green."
          else
            echo "::warning::mitata benchmarks exited with status ${status}; gate remains green."
          fi
          exit 0

  dependency-review:
    name: Dependency review (PRs)
    # Supply-chain gate: flag known-vulnerable or malicious dependencies a PR would introduce, BEFORE
    # they merge (complements Dependabot, which only bumps what's already in). PR-only — it diffs the
    # base→head manifests; the public-repo dependency graph is free.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write # post the review summary as a PR comment on failure
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  audit:
    name: Supply-chain audit (full tree)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Complements dependency-review (which only diffs a PR's NEW deps): bun audit scans the FULL
    # installed tree on every push/PR, so a CVE newly disclosed against an ALREADY-present dependency
    # is surfaced too — the class of advisory a PR-diff review structurally cannot see. The all-tier
    # scan is informational; HIGH/CRITICAL advisories fail the job.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: '1.3.14'
      - name: Cache Bun install
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
      - name: Audit dependencies (all advisories — informational)
        continue-on-error: true
        run: bun audit
      - name: Flag HIGH/CRITICAL advisories
        run: bun audit --audit-level=high
