name: ✨ Feature request
description: A new sim system, visualization, control, or analytic.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What gap or idea is this? Tie it to the living-biome vision where relevant.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: What should it do? Note any determinism, performance, or contract implications.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
