        aria-label="Cycle weather"
        title="Cycle weather"
        class="flex min-h-6.5 items-center gap-1 rounded-btn border border-emerald-300/15 bg-emerald-500/5 px-2 py-1 font-ui text-3xs whitespace-nowrap text-emerald-200/90 transition-all duration-100 select-none active:bg-emerald-400/20 active:text-white"
      >
        &#9729;
      </button>
      <button
        type="button"
        data-action="apoc"
        aria-label="Trigger apocalypse"
        title="Trigger apocalypse"
        class="flex min-h-6.5 items-center gap-1 rounded-btn border border-danger-line/20 bg-danger/5 px-2 py-1 font-ui text-3xs whitespace-nowrap text-danger-ink transition-all duration-100 select-none active:bg-danger/20 active:text-white"
      >
        &#9760;
      </button>
      <!-- V2: nav link to the collapse-field lab artifact (accent variant = navigation, not action) -->
      <a
        href="/lab"
        aria-label="Open the Quantum Wildbeyond lab artifact"
        title="Open the Quantum Wildbeyond lab artifact"
        class="flex min-h-6.5 items-center gap-1 rounded-btn border border-accent/15 bg-accent/5 px-2 py-1 font-ui text-3xs tracking-widest whitespace-nowrap text-accent/80 uppercase transition-all duration-100 select-none hover:text-accent active:bg-accent/20 active:text-white"
        >Lab</a
      >
    </div>

    <!-- Sorting-field readout (bottom position set per pointer media in app.css) -->
    <div
      id="alg"
      class="pointer-events-none fixed left-1.5 z-20 max-w-[clamp(115px,26vw,185px)] rounded-panel border border-purple-300/15 bg-void/90 px-2.5 py-1.25 backdrop-blur-lg"
    >
      <div
        id="a-name"
        class="overflow-hidden font-ui text-3xs font-semibold tracking-wide text-ellipsis whitespace-nowrap text-white"
      >
        BUBBLE FIELD
      </div>
      <div
        id="a-step"
        class="overflow-hidden font-mono text-4xs font-light text-ellipsis whitespace-nowrap text-purple-200 tabular-nums"
      >
        ---
      </div>
      <!-- V2: lore name of the camera's Voronoi sub-sector (ui/hud.ts setLore) -->
      <div
        id="lore"
        class="overflow-hidden font-ui text-4xs font-light tracking-widest text-ellipsis whitespace-nowrap text-purple-300/80 uppercase"
      >
        ---
      </div>
    </div>

    <!-- Touch joystick (shown via pointer media query in app.css; ui/input.ts tracks by identifier) -->
    <div id="joy" class="fixed z-[25]">
      <div id="jP" class="relative h-22 w-22 rounded-full border border-sky-400/15 bg-sky-900/10">
        <div
          id="jK"
          class="absolute top-7.25 left-7.25 h-7.5 w-7.5 rounded-full border-2 border-cyan-400/30 bg-cyan-400/25"
        ></div>
      </div>
    </div>

    <a
      href="/docs"
      class="fixed right-1.5 bottom-1.5 z-20 rounded-btn border border-cyan-300/15 bg-void/90 px-2 py-1 font-ui text-3xs tracking-widest text-accent/80 uppercase backdrop-blur-md hover:text-accent"
      aria-label="Open architecture documentation"
      title="Open architecture documentation"
      >Docs</a
    >

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
